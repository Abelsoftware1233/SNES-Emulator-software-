<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Echo AI - Mario Mobile Emulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="emulator-container">
        <h1>Abelsoftware123 NES Player</h1>
        
        <div class="screen-wrapper">
            <canvas id="nes-canvas" width="256" height="240"></canvas>
        </div>

        <div class="status-bar">
            <p id="status-text">Selecteer .nes bestand</p>
        </div>

        <div class="top-controls">
            <input type="file" id="rom-loader" accept=".nes">
            <button id="start-audio-btn">🔊 Audio</button>
        </div>

        <div id="mobile-controller" class="mobile-only">
            <div class="d-pad">
                <button class="btn-ctrl" id="btn-up">↑</button>
                <div class="d-pad-horizontal">
                    <button class="btn-ctrl" id="btn-left">←</button>
                    <button class="btn-ctrl" id="btn-right">→</button>
                </div>
                <button class="btn-ctrl" id="btn-down">↓</button>
            </div>

            <div class="action-keys">
                <button class="btn-ctrl btn-round" id="btn-b">B</button>
                <button class="btn-ctrl btn-round" id="btn-a">A</button>
            </div>
            
            <div class="system-keys">
                <button class="btn-ctrl btn-rect" id="btn-select">SELECT</button>
                <button class="btn-ctrl btn-rect" id="btn-start">START</button>
            </div>
        </div>

        <div class="action-buttons">
            <button id="pause-btn">⏸️</button>
            <button id="save-btn" class="blue-btn">💾 Save</button>
            <button id="load-btn" class="purple-btn">📂 Load</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
