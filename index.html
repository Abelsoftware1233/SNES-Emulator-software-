<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Echo AI - Mario Emulator</title>
    <style>
        body { background: #222; color: white; text-align: center; font-family: sans-serif; }
        canvas { border: 4px solid #555; width: 480px; image-rendering: pixelated; }
        .controls { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h1>Echo AI Mario Emulator</h1>
    <input type="file" id="rom-input" accept=".gb, .gbc">
    <br><br>
    <canvas id="screen" width="160" height="144"></canvas>

    <div class="controls">
        <p>Besturing: Pijltjestoetsen, Z (A), X (B), Enter (Start), Shift (Select)</p>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/binji/binjgb/docs/binjgb.js"></script>
    <script>
        const canvas = document.getElementById('screen');
        const romInput = document.getElementById('rom-input');

        romInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const arrayBuffer = await file.arrayBuffer();
            const romData = new Uint8Array(arrayBuffer);
            
            // Initialiseer hier de emulator-logica
            console.log("ROM geladen, grootte:", romData.length);
            startEmulator(romData);
        });

        function startEmulator(data) {
            // Hier komt de specifieke aanroep naar je gekozen emulator engine
            alert("ROM geladen! Nu moet de emulator core gekoppeld worden.");
        }
    </script>
</body>
</html>
