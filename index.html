<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo AI - Mario NES Emulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="emulator-container">
        <h1>Echo AI NES Player</h1>
        
        <div class="screen-wrapper">
            <canvas id="nes-canvas" width="256" height="240"></canvas>
        </div>

        <div class="controls-panel">
            <input type="file" id="rom-loader" accept=".nes">
            <p class="status" id="status-text">Selecteer een Mario .nes bestand</p>
        </div>

        <div class="instructions">
            <h3>Besturing:</h3>
            <ul>
                <li><strong>Pijltjestoetsen:</strong> Bewegen</li>
                <li><strong>X:</strong> A (Springen)</li>
                <li><strong>Z:</strong> B (Rennen/Vuurbal)</li>
                <li><strong>Enter:</strong> Start</li>
                <li><strong>Rechter Shift:</strong> Select</li>
            </ul>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
